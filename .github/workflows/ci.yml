name: OpenSolar CI

on:
  push:
    branches:
      - main
  pull_request:
  schedule:
    - cron: "0 6 * * *"

jobs:
  sanity:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Syntax check
        run: |
          python -m py_compile dashboard.py collect.py ha_bridge.py opendtu_stats/*.py

      - name: CLI help smoke tests
        run: |
          python collect.py --help > /dev/null
          python -m opendtu_stats.ha_bridge --help > /dev/null

      - name: Unit tests
        run: |
          python -m unittest discover -s tests -v
